<svg viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.3" fill="#C8D9B4"/>
    </pattern>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3C6B34" stop-opacity="0"/>
      <stop offset="45%" stop-color="#3C6B34" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3C6B34" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1280" height="320" fill="#F8F1E1"/>
  <rect width="1280" height="320" fill="url(#dots)" opacity="0.55"/>

  <!-- outer frame, editorial double rule -->
  <rect x="14" y="14" width="1252" height="292" fill="none" stroke="#2F4B2C" stroke-width="2"/>
  <rect x="20" y="20" width="1240" height="280" fill="none" stroke="#2F4B2C" stroke-width="0.75"/>

  <!-- top hairline under eyebrow -->
  <line x1="56" y1="66" x2="1224" y2="66" stroke="#2F4B2C" stroke-width="1"/>

  <!-- eyebrow -->
  <text x="56" y="52" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="16" fill="#3C6B34" letter-spacing="0.5">recon &amp; geo-intel, served over FastAPI</text>
  <text x="1224" y="52" text-anchor="end" font-family="Helvetica,Arial,sans-serif" font-size="12.5" letter-spacing="2" fill="#5A7A4E">// XEEVEES-LAB</text>

  <!-- title -->
  <text x="54" y="150" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="52" fill="#233A20">Network Intelligence</text>
  <text x="54" y="208" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="52" fill="#4C7A3F">Dashboard</text>

  <!-- subtitle -->
  <text x="56" y="242" font-family="Helvetica,Arial,sans-serif" font-size="15.5" fill="#4B5F41">Threaded port scanning, IP geolocation and scan history — a small FastAPI service.</text>

  <!-- tag pills: alternating filled / outlined for density -->
  <g font-family="Helvetica,Arial,sans-serif" font-size="12.5" letter-spacing="0.5" font-weight="600">
    <rect x="56" y="262" width="84" height="27" fill="#4C7A3F"/>
    <text x="72" y="280" fill="#F8F1E1">PYTHON</text>

    <rect x="150" y="262" width="86" height="27" fill="none" stroke="#3C6B34" stroke-width="1.4"/>
    <text x="166" y="280" fill="#2F4B2C">FASTAPI</text>

    <rect x="246" y="262" width="80" height="27" fill="#4C7A3F"/>
    <text x="262" y="280" fill="#F8F1E1">DOCKER</text>

    <rect x="336" y="262" width="150" height="27" fill="none" stroke="#3C6B34" stroke-width="1.4"/>
    <text x="352" y="280" fill="#2F4B2C">THREADED SCANNER</text>
  </g>

  <!-- signature: scan sweep across a row of port nodes, sage-toned -->
  <g>
    <line x1="900" y1="60" x2="1060" y2="290" stroke="url(#beam)" stroke-width="4"/>

    <!-- node baseline -->
    <line x1="838" y1="176" x2="1224" y2="176" stroke="#B9CBA3" stroke-width="1.5"/>

    <!-- closed ports (outline only) -->
    <circle cx="856" cy="176" r="6" fill="#F8F1E1" stroke="#8FA97C" stroke-width="1.5"/>
    <circle cx="902" cy="176" r="6" fill="#F8F1E1" stroke="#8FA97C" stroke-width="1.5"/>
    <circle cx="994" cy="176" r="6" fill="#F8F1E1" stroke="#8FA97C" stroke-width="1.5"/>
    <circle cx="1132" cy="176" r="6" fill="#F8F1E1" stroke="#8FA97C" stroke-width="1.5"/>
    <circle cx="1178" cy="176" r="6" fill="#F8F1E1" stroke="#8FA97C" stroke-width="1.5"/>

    <!-- open ports (solid, vibrant) -->
    <circle cx="948" cy="176" r="8" fill="#3C6B34"/>
    <circle cx="1040" cy="176" r="8" fill="#3C6B34"/>
    <circle cx="1086" cy="176" r="8" fill="#3C6B34"/>
    <circle cx="1204" cy="176" r="8" fill="#3C6B34"/>

    <!-- port labels -->
    <g font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#8FA97C">
      <text x="845" y="200">21</text>
      <text x="891" y="200">25</text>
      <text x="982" y="200">110</text>
      <text x="1121" y="200">3306</text>
      <text x="1167" y="200">8080</text>
    </g>
    <g font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#2F4B2C" font-weight="700">
      <text x="937" y="200">22</text>
      <text x="1029" y="200">80</text>
      <text x="1076" y="200">443</text>
      <text x="1195" y="200">53</text>
    </g>

    <text x="838" y="148" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="14" fill="#3C6B34">open ports detected</text>
  </g>
</svg>
